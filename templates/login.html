{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatterBox - Login</title>
    <link rel="stylesheet" href="{% static 'css/whatsapp.css' %}">
</head>
<body class="dark">
    <div class="login-container">
        <div class="login-logo">💬</div>
        <h1 class="login-title">ChatterBox</h1>
        
        <form name="log" method="post" action="{% url 'logn' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="uname">Username</label>
                <input class="form-input" type="text" id="uname" name="uname" required placeholder="Enter username">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="pawd">Password</label>
                <input class="form-input" type="password" id="pawd" name="pawd" required placeholder="Enter password">
            </div>
            
            <button class="btn-primary" type="submit">Log In</button>
        </form>
        
        <div class="login-footer">
            <p>New to ChatterBox? <a href="{% url 'registre' %}">Sign Up</a></p>
        </div>

        {% if messages %}
        <div style="margin-top: 20px; padding: 10px; border-radius: 8px; background: rgba(255, 75, 75, 0.1); border: 1px solid rgba(255, 75, 75, 0.2); color: #ff4b4b; font-size: 0.9rem;">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</body>
</html>
