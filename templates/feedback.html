{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback</title>
    <link rel="stylesheet" href="{% static 'css/whatsapp.css' %}">
</head>
<body class="dark" style="background: transparent; display: block; padding: 20px; height: auto;">
    <div style="background: var(--sidebar-bg); border-radius: 12px; padding: 24px; border: 1px solid var(--border-color);">
        <form name="fed" method="post" action="{% url 'feed' %}">
            {% csrf_token %}
            <h2 class="login-title" style="font-size: 1.4rem; margin-bottom: 20px;">Send Feedback</h2>
            
            <div class="form-group">
                <label class="form-label" for="feed">Your thoughts & suggestions</label>
                <textarea class="form-input" name="feed" id="feed" required placeholder="Type your feedback here..." style="height: 120px; resize: none;"></textarea>
            </div>
            
            <button class="btn-primary" type="submit" style="margin-top: 10px;">Submit Feedback</button>
        </form>
    </div>
</body>
</html>
