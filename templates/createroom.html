{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Room</title>
    <link rel="stylesheet" href="{% static 'css/whatsapp.css' %}">
</head>
<body class="dark" style="background: transparent; display: block; padding: 20px; height: auto;">
    <div style="background: var(--sidebar-bg); border-radius: 12px; padding: 24px; border: 1px solid var(--border-color);">
        <form name="create" method="post" action="{% url 'createroom' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="rname">Room Name</label>
                <input class="form-input" type="text" name="rname" id="rname" required pattern=".{2,24}" placeholder="Enter unique room name">
                <p id="msg" style="color: #ff4b4b; font-size: 0.8rem; margin-top: 4px;"></p>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="descrip">Room Description</label>
                <textarea class="form-input" name="descrip" id="descrip" required placeholder="What is this group about?" style="height: 100px; resize: none;"></textarea>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-primary" type="submit" style="flex: 1;">Create Room</button>
                <button class="btn-secondary" type="reset" style="flex: 1;">Reset</button>
            </div>
        </form>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.0/jquery.min.js"></script>
    <script type="text/javascript">
    $("#rname").keyup(function(){
        var room = $(this).val();
        $.ajax({
            type: "GET",
            url: "/roomcheck",
            data: { name: room },
            success: function(data) {
                if (data.is_taken) {
                    $('#msg').text(data.error_message);
                } else {
                    $('#msg').text("");
                }
            }
        });
    });
    </script>
</body>
</html>
