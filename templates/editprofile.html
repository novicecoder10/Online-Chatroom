{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="{% static 'css/whatsapp.css' %}">
</head>
<body class="dark" style="background: transparent; display: block; padding: 20px; height: auto; overflow-y: auto;">
    <div style="background: var(--sidebar-bg); border-radius: 12px; padding: 24px; border: 1px solid var(--border-color);">
        <form name="edit" method="post" action="{% url 'editprof' %}" enctype="multipart/form-data">
            {% csrf_token %}
            <h2 class="login-title" style="font-size: 1.4rem; margin-bottom: 20px;">Edit My Profile</h2>
            
            <!-- Profile Image Section -->
            <div class="form-group" style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
                {% if res.image %}
                    <img src="{{res.image.url}}" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent);">
                {% else %}
                    <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--accent); color: white; display: flex; justify-content: center; align-items: center; font-size: 2rem;">👤</div>
                {% endif %}
                <div>
                    <label class="form-label" style="margin-bottom: 8px;">Upload New Picture</label>
                    <input type="file" name="image" style="color: var(--text-primary); font-size: 0.85rem;">
                </div>
            </div>
            
            <!-- Nickname -->
            <div class="form-group">
                <label class="form-label">Nickname (Current: <span style="color: var(--accent)">{{res.user}}</span>)</label>
                <input class="form-input" type="text" name="usn" id="usn" placeholder="Enter new nickname">
                <p id="message" style="color: #ff4b4b; font-size: 0.8rem; margin-top: 4px;"></p>
            </div>
            
            <!-- Status -->
            <div class="form-group">
                <label class="form-label">Status (Current: <span style="color: var(--accent)">{{res.status}}</span>)</label>
                <select class="form-input" name="status">
                    <option value="Online" {% if res.status == 'Online' %}selected{% endif %}>Online</option>
                    <option value="Offline" {% if res.status == 'Offline' %}selected{% endif %}>Offline</option>
                    <option value="Busy" {% if res.status == 'Busy' %}selected{% endif %}>Busy</option>
                    <option value="Away" {% if res.status == 'Away' %}selected{% endif %}>Away</option>
                </select>
            </div>
            
            <!-- Bio -->
            <div class="form-group">
                <label class="form-label">Bio (Current: <span style="color: var(--text-secondary)">{{res.bio}}</span>)</label>
                <textarea class="form-input" name="bio" placeholder="Update bio..." style="height: 60px; resize: none;"></textarea>
            </div>
            
            <!-- About -->
            <div class="form-group">
                <label class="form-label">About (Current: <span style="color: var(--text-secondary)">{{res.about}}</span>)</label>
                <textarea class="form-input" name="about" placeholder="Update about info..." style="height: 60px; resize: none;"></textarea>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-primary" type="submit" style="flex: 1;">Save Changes</button>
                <button class="btn-secondary" type="reset" style="flex: 1;">Reset</button>
            </div>
        </form>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.0/jquery.min.js"></script>
    <script type="text/javascript">
        $("#usn").keyup(function(){
            var uname = $(this).val();
            $.ajax({
                type: "GET",
                url: "/usnachk",
                data: { usid: uname },
                success: function(data){
                    if (data.is_taken) {
                        $("#message").text(data.error_message);
                    } else {
                        $("#message").text("");
                    }
                }
            });
        });
    </script>
</body>
</html>
